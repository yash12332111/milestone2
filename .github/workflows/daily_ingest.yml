name: Daily Knowledge Base Refresh

on:
  schedule:
    - cron: '45 3 * * *'    # 3:45 AM UTC = 9:15 AM IST
  workflow_dispatch:          # Manual trigger button in GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: playwright install chromium --with-deps

      - name: Run Ingestion Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CHROMA_CLOUD_API_KEY: ${{ secrets.CHROMA_CLOUD_API_KEY }}
          CHROMA_TENANT: ${{ vars.CHROMA_TENANT || 'default_tenant' }}
          CHROMA_DATABASE: ${{ vars.CHROMA_DATABASE || 'default_database' }}
        run: python -m phase1_data_ingestion.ingestion.run_pipeline

      - name: Commit Scraped Data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scraped_data.json || true
          git diff --cached --quiet || git commit -m "chore: daily knowledge base refresh $(date +%Y-%m-%d)"
          git push
