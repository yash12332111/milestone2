name: Daily Knowledge Base Refresh

on:
  schedule:
    - cron: '45 3 * * *'    # 3:45 AM UTC = 9:15 AM IST
  workflow_dispatch:          # Manual trigger button in GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Wake up Render service
        run: |
          echo "Pinging health endpoint to wake Render free-tier service..."
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://fundfacts-api.onrender.com/health --max-time 30)
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Service is up."
              break
            fi
            echo "Not ready yet — waiting 30s..."
            sleep 30
          done

      - name: Trigger ingestion pipeline on Render
        run: |
          echo "Calling /admin/ingest ..."
          RESPONSE=$(curl -s -X POST https://fundfacts-api.onrender.com/admin/ingest \
            --max-time 900 \
            -H "Content-Type: application/json" \
            -w "\n---HTTP_STATUS:%{http_code}")
          echo "$RESPONSE"
          HTTP_CODE=$(echo "$RESPONSE" | grep -o "HTTP_STATUS:[0-9]*" | cut -d: -f2)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Ingestion failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Ingestion succeeded."
