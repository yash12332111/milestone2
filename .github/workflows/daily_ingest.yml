name: Daily Knowledge Base Refresh

on:
  schedule:
    - cron: '45 3 * * *'    # 3:45 AM UTC = 9:15 AM IST
  workflow_dispatch:          # Manual trigger button in GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: playwright install chromium --with-deps

      - name: Run Scraper
        run: python -c "
          from phase1_data_ingestion.scraper.scraper import scrape_all_urls
          import json, os
          data = scrape_all_urls()
          os.makedirs('data', exist_ok=True)
          with open('data/scraped_data.json', 'w') as f:
            json.dump(data, f, indent=4, ensure_ascii=False)
          print(f'Scraped {len(data)} URLs')
          "

      - name: Commit Scraped Data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scraped_data.json || true
          git diff --cached --quiet || git commit -m "chore: daily knowledge base refresh $(date +%Y-%m-%d)"
          git push
